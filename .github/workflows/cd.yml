name: CD — Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_PROJECT_NAME: WalttiAnalyzer
  AZURE_ENV: prod
  AZURE_RESOURCE_GROUP: WalttiAnalyzer-prod-rg

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt && pip install pytest
      - run: pytest tests/ -v
        env:
          DIGITRANSIT_API_KEY: test-key

  deploy-infra:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      appName: ${{ steps.deploy.outputs.appName }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location germanywestcentral \
            2>/dev/null || true

      - name: Deploy Bicep
        id: deploy
        env:
          DIGITRANSIT_API_KEY: ${{ secrets.DIGITRANSIT_API_KEY }}
        run: |
          result=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters projectName=${{ env.AZURE_PROJECT_NAME }} \
            --parameters env=${{ env.AZURE_ENV }} \
            --parameters "digitransitApiKey=$DIGITRANSIT_API_KEY" \
            --parameters skuName=B1 \
            --query 'properties.outputs' -o json)
          echo "appName=$(echo $result | jq -r '.appName.value')" >> $GITHUB_OUTPUT

  deploy-app:
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build deployment package
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
          zip -r deploy.zip . -x '.git/*' '.github/*' '.venv/*' 'tests/*' '.pytest*' '*.pyc' '__pycache__/*'

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        run: |
          az webapp deploy \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ needs.deploy-infra.outputs.appName }} \
            --src-path deploy.zip \
            --type zip
