name: CD — Deploy to Azure

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AZURE_PROJECT_NAME: WalttiAnalyzer
  AZURE_ENV: prod
  AZURE_RESOURCE_GROUP: WalttiAnalyzer-prod-rg

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      webAppName: ${{ steps.deploy-bicep.outputs.webAppName }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location westeurope \
            2>/dev/null || true

      - name: Deploy Bicep
        id: deploy-bicep
        env:
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
          DIGITRANSIT_API_KEY: ${{ secrets.DIGITRANSIT_API_KEY }}
          NOTIFICATION_EMAIL: ${{ vars.NOTIFICATION_EMAIL }}
          AGENT_PRINCIPAL_ID: ${{ vars.AGENT_PRINCIPAL_ID }}
        run: |
          DEPLOYMENT=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters projectName=${{ env.AZURE_PROJECT_NAME }} \
            --parameters env=${{ env.AZURE_ENV }} \
            --parameters "digitransitApiKey=$DIGITRANSIT_API_KEY" \
            --parameters "sqlAdminPassword=$SQL_ADMIN_PASSWORD" \
            --parameters "notificationEmail=$NOTIFICATION_EMAIL" \
            --parameters "agentPrincipalId=$AGENT_PRINCIPAL_ID" \
            --output json)
          echo "webAppName=$(echo $DEPLOYMENT | jq -r '.properties.outputs.webAppName.value')" >> $GITHUB_OUTPUT

  deploy-api:
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact from CI
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./publish
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build artifact (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          dotnet-version: "10.0.x"

      - name: Publish Web App (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          dotnet publish src/WalttiAnalyzer.Web/WalttiAnalyzer.Web.csproj \
            --configuration Release \
            --output ./publish

      - name: Create deployment zip
        run: cd publish && zip -r ../app-deploy.zip .

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Web App
        run: |
          az webapp deploy \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ needs.deploy-infra.outputs.webAppName }} \
            --src-path app-deploy.zip \
            --type zip
