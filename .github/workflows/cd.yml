name: CD â€” Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_PROJECT_NAME: WalttiAnalyzer
  AZURE_ENV: prod
  AZURE_RESOURCE_GROUP: WalttiAnalyzer-prod-rg

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test tests/WalttiAnalyzer.Tests/WalttiAnalyzer.Tests.csproj --verbosity normal

  deploy-infra:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location germanywestcentral \
            2>/dev/null || true

      - name: Deploy Bicep
        id: deploy
        env:
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
          DIGITRANSIT_API_KEY: ${{ secrets.DIGITRANSIT_API_KEY }}
        run: |
          result=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters projectName=${{ env.AZURE_PROJECT_NAME }} \
            --parameters env=${{ env.AZURE_ENV }} \
            --parameters "digitransitApiKey=$DIGITRANSIT_API_KEY" \
            --parameters "sqlAdminPassword=$SQL_ADMIN_PASSWORD" \
            --query 'properties.outputs' -o json)
          echo "functionAppName=$(echo $result | jq -r '.functionAppName.value')" >> $GITHUB_OUTPUT
          echo "staticWebAppName=$(echo $result | jq -r '.staticWebAppName.value')" >> $GITHUB_OUTPUT

  deploy-api:
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Function App
        run: |
          dotnet publish api/WalttiAnalyzer.Functions/WalttiAnalyzer.Functions.csproj \
            --configuration Release \
            --output ./publish
          cd publish && zip -r ../api-deploy.zip .

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ needs.deploy-infra.outputs.functionAppName }} \
            --src api-deploy.zip

  deploy-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          token=$(az staticwebapp secrets list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ needs.deploy-infra.outputs.staticWebAppName }} \
            --query 'properties.apiKey' -o tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> $GITHUB_OUTPUT

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          skip_app_build: true
          skip_api_build: true
