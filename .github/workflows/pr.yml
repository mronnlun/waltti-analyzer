name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest ruff
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest tests/ -v
        env:
          DIGITRANSIT_API_KEY: test-key
      - name: Verify app starts
        run: |
          timeout 5 python -c "
          import os
          os.environ['DIGITRANSIT_API_KEY'] = 'test-key'
          from app import create_app
          app = create_app()
          print('App created successfully')
          " || true
