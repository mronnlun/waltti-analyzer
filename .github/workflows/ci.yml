name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build Web App
        run: dotnet build src/WalttiAnalyzer.Web/WalttiAnalyzer.Web.csproj

      - name: Run tests
        run: dotnet test tests/WalttiAnalyzer.Tests/WalttiAnalyzer.Tests.csproj --verbosity normal

      - name: Publish Web App
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          dotnet publish src/WalttiAnalyzer.Web/WalttiAnalyzer.Web.csproj \
            --configuration Release \
            --output ./publish

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: web-app
          path: ./publish
          include-hidden-files: true
