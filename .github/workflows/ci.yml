name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Function App
        run: dotnet build api/WalttiAnalyzer.Functions/WalttiAnalyzer.Functions.csproj

      - name: Run tests
        run: dotnet test tests/WalttiAnalyzer.Tests/WalttiAnalyzer.Tests.csproj --verbosity normal

      - name: Publish Function App
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          dotnet publish api/WalttiAnalyzer.Functions/WalttiAnalyzer.Functions.csproj \
            --configuration Release \
            --output ./publish

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish
          include-hidden-files: true
