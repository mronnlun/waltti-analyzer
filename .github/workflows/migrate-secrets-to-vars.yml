name: Migrate secrets to repository variables

on:
  workflow_dispatch:

permissions:
  variables: write
  secrets: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      AGENT_PRINCIPAL_ID: ${{ secrets.AGENT_PRINCIPAL_ID }}
    steps:
      - name: Set repository variables
        run: |
          gh variable set AZURE_CLIENT_ID      --body "$AZURE_CLIENT_ID"
          gh variable set AZURE_TENANT_ID      --body "$AZURE_TENANT_ID"
          gh variable set AZURE_SUBSCRIPTION_ID --body "$AZURE_SUBSCRIPTION_ID"
          gh variable set NOTIFICATION_EMAIL   --body "$NOTIFICATION_EMAIL"
          gh variable set AGENT_PRINCIPAL_ID   --body "$AGENT_PRINCIPAL_ID"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Delete migrated secrets
        run: |
          gh secret delete AZURE_CLIENT_ID
          gh secret delete AZURE_TENANT_ID
          gh secret delete AZURE_SUBSCRIPTION_ID
          gh secret delete NOTIFICATION_EMAIL
          gh secret delete AGENT_PRINCIPAL_ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
