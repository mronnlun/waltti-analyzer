name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    env:
      AZURE_RESOURCE_GROUP: WalttiAnalyzer-prod-rg
      LOG_ANALYTICS_WORKSPACE_NAME: WalttiAnalyzer-prod-log

    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication to Azure

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore src/WalttiAnalyzer.Web/WalttiAnalyzer.Web.csproj

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure Monitor environment variables
        run: |
          WORKSPACE_ID=$(az monitor log-analytics workspace show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ env.LOG_ANALYTICS_WORKSPACE_NAME }} \
            --query customerId \
            --output tsv)
          echo "LOG_ANALYTICS_WORKSPACE_ID=$WORKSPACE_ID" >> $GITHUB_ENV
