<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bus body -->
  <rect x="2" y="8" width="28" height="16" rx="3" fill="#2c3e50"/>
  <!-- Windows -->
  <rect x="5" y="11" width="6" height="5" rx="1" fill="#ecf0f1"/>
  <rect x="13" y="11" width="6" height="5" rx="1" fill="#ecf0f1"/>
  <!-- Clock window (right side) -->
  <circle cx="25" cy="13.5" r="3.5" fill="white"/>
  <line x1="25" y1="11.5" x2="25" y2="13.5" stroke="#2c3e50" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="25" y1="13.5" x2="26.8" y2="14.3" stroke="#2c3e50" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="9" cy="25" r="3" fill="#2c3e50" stroke="#ecf0f1" stroke-width="1"/>
  <circle cx="9" cy="25" r="1.2" fill="#ecf0f1"/>
  <circle cx="23" cy="25" r="3" fill="#2c3e50" stroke="#ecf0f1" stroke-width="1"/>
  <circle cx="23" cy="25" r="1.2" fill="#ecf0f1"/>
  <!-- Bus undercarriage -->
  <rect x="5" y="22" width="22" height="2" rx="1" fill="#34495e"/>
  <!-- Front bumper stripe -->
  <rect x="2" y="20" width="3" height="1.5" rx="0.5" fill="#3498db"/>
</svg>
